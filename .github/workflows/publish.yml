name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:   # manual build (no publish) to verify the binaries bundle

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The proxy binaries are not committed; they're cross-compiled from the
      # bitbang-cli Go source at build time and bundled into the package. Pin a
      # tag via the BITBANG_CLI_REF repo variable for reproducible releases.
      # bitbang-cli is public, so the default workflow token can read it.
      - name: Checkout bitbang-cli (Go source)
        uses: actions/checkout@v4
        with:
          repository: richlegrand/bitbang-cli
          ref: ${{ vars.BITBANG_CLI_REF || 'main' }}
          path: _bitbang-cli

      - uses: actions/setup-go@v5
        with:
          go-version-file: _bitbang-cli/go.mod

      - name: Cross-compile + bundle proxy binaries
        run: ./scripts/build-proxy.sh _bitbang-cli

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify binaries are bundled in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          bins = sorted(n for n in names if '/bin/bitbang-linux-' in n)
          print('bundled in', whl + ':', bins)
          assert any('arm64' in b for b in bins), 'arm64 binary missing from wheel'
          assert any('armv7' in b for b in bins), 'armv7 binary missing from wheel'
          assert any('amd64' in b for b in bins), 'amd64 binary missing from wheel'
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Publish to PyPI
        if: github.event_name == 'release'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
