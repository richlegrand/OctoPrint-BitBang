name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:   # manual build (no publish) to verify the binaries bundle

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach release.zip to the GitHub release

    steps:
      - uses: actions/checkout@v4

      # The proxy binaries are not committed; they're cross-compiled from the
      # bitbang-cli Go source at build time and bundled into the package. Pin a
      # tag via the BITBANG_CLI_REF repo variable for reproducible releases.
      # bitbang-cli is public, so the default workflow token can read it.
      - name: Checkout bitbang-cli (Go source)
        uses: actions/checkout@v4
        with:
          repository: richlegrand/bitbang-cli
          ref: ${{ vars.BITBANG_CLI_REF || 'main' }}
          path: _bitbang-cli

      - uses: actions/setup-go@v5
        with:
          go-version-file: _bitbang-cli/go.mod

      - name: Cross-compile + bundle proxy binaries
        run: ./scripts/build-proxy.sh _bitbang-cli

      # Zip the source tree together with the just-built bin/ binaries. This is
      # what OctoPrint's Plugin Manager installs from -- it pip-installs an
      # archive URL, not a PyPI name -- so the registry listing's `archive:`
      # field points at this asset (releases/latest/download/release.zip).
      - name: Bundle source + binaries into release.zip
        run: |
          zip -r release.zip . -x '.git/*' '_bitbang-cli/*' 'dist/*' '*.zip'
          python - <<'PY'
          import zipfile
          names = zipfile.ZipFile('release.zip').namelist()
          bins = sorted(n for n in names if 'octoprint_bitbang/bin/bitbang-linux-' in n)
          print('bundled in release.zip:', bins)
          for arch in ('arm64', 'armv7', 'amd64'):
              assert any(arch in b for b in bins), f'{arch} binary missing from release.zip'
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Verify binaries are bundled in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob('dist/*.whl')[0]
          names = zipfile.ZipFile(whl).namelist()
          bins = sorted(n for n in names if '/bin/bitbang-linux-' in n)
          print('bundled in', whl + ':', bins)
          assert any('arm64' in b for b in bins), 'arm64 binary missing from wheel'
          assert any('armv7' in b for b in bins), 'armv7 binary missing from wheel'
          assert any('amd64' in b for b in bins), 'amd64 binary missing from wheel'
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/*
            release.zip

      # Attach the release.zip FIRST — Plugin Manager installs from this asset
      # (not PyPI), so it's the critical artifact and must never be blocked by
      # a downstream step failing.
      - name: Attach release.zip to the GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip

      # PyPI is best-effort (Plugin Manager can't install from a bare PyPI
      # package anyway). continue-on-error so a PyPI hiccup doesn't fail the
      # release or skip the asset attach above.
      - name: Publish to PyPI
        if: github.event_name == 'release'
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
